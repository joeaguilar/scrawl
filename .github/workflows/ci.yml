name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  grammar-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tests/grammar/package-lock.json
      - name: Install test dependencies
        working-directory: tests/grammar
        run: npm ci
      - name: Run grammar tests
        working-directory: tests/grammar
        run: npm test

  package-extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build VSIX
        working-directory: vscode
        run: npx --yes @vscode/vsce package
      - uses: actions/upload-artifact@v4
        with:
          name: scrawl-vsix
          path: vscode/*.vsix
